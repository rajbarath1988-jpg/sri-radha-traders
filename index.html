  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --green:#1a6b3c; --green-light:#2d9152; --green-pale:#e8f5ee;
    --cream:#faf8f3; --brown:#5c4a32; --orange:#e8651a; --red:#dc2626;
    --blue:#1d4ed8; --purple:#7c3aed;
    --text:#1c1c1c; --text-muted:#7a7060;
    --shadow:0 4px 20px rgba(0,0,0,0.08); --shadow-lg:0 8px 40px rgba(0,0,0,0.14);
    --radius:16px; --radius-sm:10px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); }
  .app { max-width:430px; margin:0 auto; min-height:100vh; background:var(--cream); position:relative; }

  /* \u2500\u2500 LOGIN \u2500\u2500 */
  .login-page { min-height:100vh; display:flex; flex-direction:column; background:var(--cream); }
  .login-top { background:linear-gradient(160deg,#1a6b3c 0%,#2d9152 60%,#3aaf68 100%); padding:60px 32px 80px; text-align:center; position:relative; overflow:hidden; }
  .login-top::before { content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px; background:rgba(255,255,255,0.06); border-radius:50%; pointer-events:none; }
  .login-top::after { content:''; position:absolute; bottom:-40px; left:-40px; width:140px; height:140px; background:rgba(255,255,255,0.05); border-radius:50%; pointer-events:none; }
  .login-logo { width:80px; height:80px; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; position:relative; z-index:1; }
  .login-store { font-family:'Playfair Display',serif; color:white; font-size:22px; font-weight:700; position:relative; z-index:1; }
  .login-tagline { color:rgba(255,255,255,0.8); font-size:13px; margin-top:4px; position:relative; z-index:1; }
  .login-card { background:white; margin:-32px 20px 0; border-radius:24px; padding:32px 24px 28px; box-shadow:0 8px 40px rgba(0,0,0,0.12); position:relative; z-index:2; }
  .login-card h2 { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:6px; }
  .login-card p { font-size:13px; color:var(--text-muted); margin-bottom:24px; line-height:1.5; }
  .login-tabs { display:flex; background:#f0ebe0; border-radius:12px; padding:4px; margin-bottom:24px; }
  .login-tab { flex:1; padding:9px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .login-tab.active { background:white; color:var(--green); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .login-label { font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; display:block; }
  .login-input { width:100%; padding:14px 16px; border:2px solid #e8e4dc; border-radius:12px; font-size:15px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; background:white; color:var(--text); }
  .login-input:focus { border-color:var(--green); }
  .login-input::placeholder { color:#bbb; }
  .login-hint { font-size:11px; color:var(--text-muted); margin-top:6px; margin-bottom:20px; }
  .login-btn { width:100%; background:var(--green); color:white; border:none; border-radius:14px; padding:16px; font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.2s; margin-top:4px; }
  .login-btn:hover { background:var(--green-light); }
  .login-btn:disabled { background:#b0c4b8; cursor:not-allowed; }
  .login-error { background:#fee2e2; color:#dc2626; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px; }
  .login-footer { text-align:center; padding:20px; font-size:12px; color:var(--text-muted); }

  /* \u2500\u2500 HEADER \u2500\u2500 */
  .header { background:var(--green); padding:20px 20px 28px; position:relative; overflow:hidden; }
  .header::before { content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px; background:rgba(255,255,255,0.07); border-radius:50%; pointer-events:none; }
  .header::after { content:''; position:absolute; bottom:-30px; left:30px; width:80px; height:80px; background:rgba(255,255,255,0.05); border-radius:50%; pointer-events:none; }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; position:relative; z-index:1; }
  .store-name { font-family:'Playfair Display',serif; color:white; font-size:17px; font-weight:700; letter-spacing:0.5px; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .mode-toggle { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:white; padding:6px 14px; border-radius:20px; cursor:pointer; font-size:12px; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.2s; position:relative; z-index:1; }
  .mode-toggle:hover { background:rgba(255,255,255,0.25); }
  .logout-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:6px 10px; border-radius:20px; cursor:pointer; font-size:11px; font-family:'DM Sans',sans-serif; font-weight:500; transition:all 0.2s; position:relative; z-index:1; }
  .logout-btn:hover { background:rgba(255,0,0,0.2); }
  .user-chip { background:rgba(255,255,255,0.15); border-radius:20px; padding:4px 10px; font-size:11px; color:white; font-weight:500; position:relative; z-index:1; }
  .search-bar { background:white; border-radius:14px; display:flex; align-items:center; padding:12px 16px; gap:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12); margin:0 2px 2px; border:1.5px solid rgba(255,255,255,0.8); }
  .search-bar input { border:none; outline:none; flex:1; font-size:15px; font-family:'DM Sans',sans-serif; background:transparent; color:var(--text); }
  .search-bar input::placeholder { color:#a0a0a0; }
  .search-icon { color:var(--green); font-size:18px; flex-shrink:0; }

  /* \u2500\u2500 NAV \u2500\u2500 */
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:430px; background:white; border-top:1px solid #e8e4dc; display:flex; z-index:100; box-shadow:0 -4px 20px rgba(0,0,0,0.08); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0 14px; cursor:pointer; gap:4px; transition:all 0.2s; color:var(--text-muted); border:none; background:transparent; font-family:'DM Sans',sans-serif; }
  .nav-item.active { color:var(--green); }
  .nav-item .icon { font-size:22px; }
  .nav-item .label { font-size:10px; font-weight:500; }
  .nav-badge { position:relative; display:inline-block; }
  .badge { position:absolute; top:-4px; right:-8px; background:var(--orange); color:white; font-size:9px; font-weight:700; padding:1px 5px; border-radius:10px; min-width:16px; text-align:center; }

  /* \u2500\u2500 CONTENT \u2500\u2500 */
  .content { padding:0 0 90px; }
  .section { padding:20px 20px 0; }
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .section-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; }
  .categories-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 20px 4px; scrollbar-width:none; }
  .categories-scroll::-webkit-scrollbar { display:none; }

  .stat-card { background:white; border-radius:var(--radius-sm); padding:16px; box-shadow:var(--shadow); cursor:pointer; transition:all 0.18s; border:2px solid transparent; user-select:none; }

  .stat-card.active-card { border-color:var(--green); background:var(--green-pale); }
  .dash-back { display:flex; align-items:center; gap:8px; background:var(--green-pale); color:var(--green); border:none; border-radius:10px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:16px; font-family:"DM Sans",sans-serif; }
  .dash-section-title { font-family:"Playfair Display",serif; font-size:18px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .sales-dropdown-wrap { position:relative; }
  .sales-period-btn { background:var(--green); color:white; border:none; border-radius:10px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:"DM Sans",sans-serif; display:flex; align-items:center; gap:6px; }
  .sales-dropdown { position:absolute; top:calc(100% + 6px); right:0; background:white; border-radius:12px; box-shadow:var(--shadow-lg); overflow:hidden; z-index:50; min-width:160px; border:1px solid #e8e4dc; }

  .sales-option.active { background:var(--green-pale); color:var(--green); font-weight:700; }
  .sales-big { font-family:"Playfair Display",serif; font-size:32px; font-weight:900; color:var(--green); margin:8px 0 4px; }
  .sales-chart-bar { background:var(--green-pale); border-radius:var(--radius); padding:16px; margin-top:16px; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }

  .stat-icon { font-size:24px; margin-bottom:6px; }
  .stat-value { font-size:22px; font-weight:700; font-family:'Playfair Display',serif; }
  .stat-label { font-size:11px; color:var(--text-muted); font-weight:500; }
  .mgmt-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .mgmt-tab { padding:7px 16px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid #e0dbd0; background:transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .mgmt-tab.active { background:var(--green); color:white; border-color:var(--green); }

  /* \u2500\u2500 FAB \u2500\u2500 */
  .fab { position:fixed; bottom:28px; right:calc(50% - 215px + 16px); width:54px; height:54px; border-radius:50%; background:var(--green); color:white; border:none; font-size:28px; cursor:pointer; box-shadow:0 4px 20px rgba(26,107,60,0.45); display:flex; align-items:center; justify-content:center; z-index:101; transition:transform 0.2s; }
  .fab:hover { transform:scale(1.1); }
  .fab-cam { position:fixed; bottom:96px; right:calc(50% - 215px + 16px); width:48px; height:48px; border-radius:50%; background:#1d4ed8; color:white; border:none; font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(29,78,216,0.45); display:flex; align-items:center; justify-content:center; z-index:101; transition:transform 0.2s; }

  /* \u2500\u2500 BARCODE SCANNER MODAL \u2500\u2500 */
  .scanner-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.92); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:40px; }
  .scanner-header { color:white; font-size:18px; font-weight:700; margin-bottom:8px; font-family:'Playfair Display',serif; }
  .scanner-sub { color:rgba(255,255,255,0.6); font-size:13px; margin-bottom:20px; text-align:center; padding:0 20px; }
  .scanner-video-wrap { position:relative; width:300px; height:300px; border-radius:16px; overflow:hidden; border:3px solid #e8b820; }
  .scanner-video-wrap video { width:100%; height:100%; object-fit:cover; }
  .scanner-line { position:absolute; top:50%; left:0; right:0; height:2px; background:#e8b820; box-shadow:0 0 8px #e8b820; animation:scan 2s linear infinite; }
  @keyframes scan { 0%{top:20%} 50%{top:80%} 100%{top:20%} }
  .scanner-corners::before,.scanner-corners::after { content:''; position:absolute; width:24px; height:24px; border-color:#e8b820; border-style:solid; border-width:0; }
  .scanner-corners::before { top:8px; left:8px; border-top-width:3px; border-left-width:3px; border-radius:4px 0 0 0; }
  .scanner-corners::after  { bottom:8px; right:8px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }
  .scanner-result { background:white; border-radius:12px; padding:12px 18px; margin-top:16px; width:300px; text-align:center; font-size:14px; font-weight:600; color:var(--green); }
  .scanner-close { margin-top:16px; color:white; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); padding:12px 32px; border-radius:12px; font-size:15px; cursor:pointer; font-family:'DM Sans',sans-serif; }

  /* \u2500\u2500 MODALS \u2500\u2500 */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
  .modal { background:white; border-radius:24px 24px 0 0; padding:24px 20px 40px; width:100%; max-width:430px; animation:slideUp 0.3s ease; max-height:90vh; overflow-y:auto; }

  .modal-handle { width:40px; height:4px; background:#e0dbd0; border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:16px; }
  .modal-label { font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; display:block; }
  .modal-input { width:100%; padding:12px 14px; border:1.5px solid #e0dbd0; border-radius:10px; font-size:14px; margin-bottom:14px; font-family:'DM Sans',sans-serif; outline:none; }

  .modal-select { width:100%; padding:12px 14px; border:1.5px solid #e0dbd0; border-radius:10px; font-size:14px; margin-bottom:14px; font-family:'DM Sans',sans-serif; outline:none; background:white; }
  .modal-btn { width:100%; background:var(--green); color:white; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }

  .emoji-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:14px; }

  .emoji-opt.selected { border-color:var(--green); background:var(--green-pale); }
  .emoji-opt:hover { background:var(--green-pale); }
  .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:flex; align-items:center; justify-content:center; padding:24px; }
  .confirm-modal { background:white; border-radius:20px; padding:28px 24px; width:100%; max-width:340px; text-align:center; animation:popIn 0.2s ease; }
  @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .confirm-emoji { font-size:48px; margin-bottom:12px; }
  .confirm-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; margin-bottom:8px; }
  .confirm-text { font-size:13px; color:var(--text-muted); margin-bottom:20px; line-height:1.5; }

  .confirm-cancel { flex:1; padding:12px; border-radius:10px; border:1.5px solid #e0dbd0; background:transparent; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .confirm-delete { flex:1; padding:12px; border-radius:10px; border:none; background:var(--red); color:white; font-size:14px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .success-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--green); color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; z-index:400; animation:fadeToast 2.2s forwards; white-space:nowrap; }

  /* \u2500\u2500 NOTIFICATION BELL \u2500\u2500 */
  .notif-bell-wrap { position:relative; }
  .notif-bell-btn { background:rgba(255,255,255,0.15); border:none; border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; position:relative; transition:background 0.2s; flex-shrink:0; }
  .notif-bell-btn:hover { background:rgba(255,255,255,0.25); }
  .notif-badge { position:absolute; top:-4px; right:-4px; background:#ef4444; color:white; font-size:10px; font-weight:700; border-radius:999px; min-width:18px; height:18px; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--green); animation:badgePop 0.3s ease; }
  @keyframes badgePop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .notif-panel { position:fixed; top:0; right:0; width:min(360px,100vw); height:100vh; background:white; box-shadow:-4px 0 30px rgba(0,0,0,0.15); z-index:300; display:flex; flex-direction:column; animation:slideInRight 0.25s ease; }
  @keyframes slideInRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
  .notif-panel-header { background:var(--green); color:white; padding:20px 18px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .notif-panel-title { font-size:18px; font-weight:700; font-family:"Playfair Display",serif; }
  .notif-panel-sub { font-size:12px; opacity:0.8; margin-top:2px; }
  .notif-close-btn { background:rgba(255,255,255,0.2); border:none; color:white; border-radius:8px; width:32px; height:32px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .notif-list { flex:1; overflow-y:auto; padding:12px; }
  .notif-card { background:white; border-radius:12px; padding:14px; margin-bottom:10px; border:1.5px solid #e8e4dc; cursor:pointer; transition:all 0.15s; position:relative; }
  .notif-card.unread { border-color:var(--green); background:#f0faf4; }
  .notif-card:hover { box-shadow:var(--shadow); }
  .notif-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .notif-order-id { font-size:13px; font-weight:700; color:var(--green); }
  .notif-time { font-size:11px; color:var(--text-muted); }
  .notif-mobile { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
  .notif-items { font-size:12px; color:var(--text); line-height:1.5; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .notif-total { font-size:13px; font-weight:700; color:var(--green); }
  .notif-unread-dot { width:8px; height:8px; background:var(--green); border-radius:50%; position:absolute; top:14px; right:14px; }
  .notif-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .notif-empty-icon { font-size:48px; margin-bottom:12px; }
  .notif-mark-all { background:var(--green-pale); color:var(--green); border:none; border-radius:8px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:"DM Sans",sans-serif; margin:0 12px 8px; width:calc(100% - 24px); }
  .notif-overlay-bg { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:299; }

  /* \u2500\u2500 ADMIN ORDER VIEW & PRINT \u2500\u2500 */
  .admin-order-view { padding:2px 0; }
  .admin-view-section { background:#f8faf8; border-radius:12px; padding:14px; margin-bottom:12px; }

  .admin-view-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #edf2ec; font-size:13px; }

  .admin-view-label { color:var(--text-muted); }
  .admin-view-val { font-weight:600; text-align:right; }

  /* \u2500\u2500 PRINT PREVIEW MODAL \u2500\u2500 */
  .print-preview-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:600; display:flex; flex-direction:column; overflow-y:auto; }
  .print-preview-toolbar { background:#1e293b; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; position:sticky; top:0; z-index:1; }

  .print-close-btn { background:rgba(255,255,255,0.1); color:white; border:none; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; font-family:"DM Sans",sans-serif; }
  .print-paper { background:white; width:min(380px,92vw); margin:20px auto; border-radius:4px; box-shadow:0 8px 40px rgba(0,0,0,0.4); }

  /* \u2500\u2500 PRINT MEDIA \u2500\u2500 */
  @media print {
    body * { visibility:hidden !important; }
    .print-paper, .print-paper * { visibility:visible !important; }
    .print-paper { position:fixed !important; top:0 !important; left:0 !important; width:100% !important; margin:0 !important; box-shadow:none !important; border-radius:0 !important; }
    .print-preview-toolbar { display:none !important; }
  }

  /* \u2500\u2500 ACKNOWLEDGED STATUS \u2500\u2500 */
